version: "3"

tasks:
  default:
    desc: Build, lint, and test
    cmds:
      - task: tidy
      - task: test
      - task: build

  build:
    desc: Build the binary
    cmds:
      - go build -o bin/2fa .

  install:
    desc: Build and install to ~/.local/bin
    deps:
      - build
    cmds:
      - cp bin/2fa ~/.local/bin/2fa
    sources:
      - bin/2fa

  test:
    desc: Run all tests
    cmds:
      - go vet ./...
      - go test -count=1 ./...

  clean:
    desc: Remove built binary
    cmds:
      - rm -f bin/2fa

  tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  release-dry:
    desc: Dry-run goreleaser
    cmds:
      - goreleaser release --clean --snapshot --skip=publish

  # detailed func coverage report
  coverage:
    desc: Generate a detailed function coverage report
    cmds:
      - go test -coverprofile=/tmp/coverage.out ./...
      - go tool cover -func=/tmp/coverage.out
